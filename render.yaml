services:
  - type: web
    name: storage-organizer-web
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PASSWORD
        sync: false
      - key: DATA_ROOT
        value: /opt/render/project/src/storage
    disk:
      name: storage-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
